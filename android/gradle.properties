# JDK for the Gradle daemon and javac (must match app compileOptions Java 21).
# Gradle does not read org.gradle.java.home from local.properties — only here, env, or -D.
# Point to JDK 21 (e.g. Android Studio: <install>\jbr, or Temurin 21). Update if this path is wrong on your PC.
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr

# Keep heap within system RAM; raise if builds stall (TimeoutException) under memory pressure.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Use old AGP DSL so Flutter Gradle plugin works (Flutter 3.41+)
android.newDsl=false
# Avoid Kotlin daemon crash when project (D:) and Pub cache (C:) are on different drives
kotlin.incremental=false

# Longer HTTP timeouts (ms) — helps TimeoutException on slow networks or heavy AV scanning.
systemProp.org.gradle.internal.http.connectionTimeout=600000
systemProp.org.gradle.internal.http.socketTimeout=600000

org.gradle.daemon=true
org.gradle.caching=true
org.gradle.parallel=true
